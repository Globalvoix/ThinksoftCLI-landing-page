name: Thinksoft

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  Thinksoft:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /Thinksoft') ||
      startsWith(github.event.comment.body, '/Thinksoft')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      id-token: write
      contents: read
      pull-requests: read
      issues: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: ./.github/actions/setup-bun

      - name: Run Thinksoft
        uses: thinksoft/thinksoft/github@2c14fc5586fe0b88e5c04732d2e846769cc35671 # latest
        env:
          THINKSOFT_API_KEY: ${{ secrets.THINKSOFT_API_KEY }}
          THINKSOFT_PERMISSION: '{"bash": "deny"}'
        with:
          model: Thinksoft/claude-opus-4-5
